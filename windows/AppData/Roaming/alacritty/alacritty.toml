[window]
dynamic_padding = true
opacity = 1

[scrolling]
history = 100000

[font]
normal = { family = 'Iosevka Nerd Font', style = 'Regular' }
size = 11

[colors]
transparent_background_colors = true

[colors.primary]
background = '#ffffff'
foreground = '#1d1d20'

[colors.normal]
black   = '#1d1d20'
red     = '#c01c28'
green   = '#26a269'
yellow  = '#a2734c'
blue    = '#12488b'
magenta = '#a347ba'
cyan    = '#2aa1b3'
white   = '#cfcfcf'

[colors.bright]
black   = '#5d5d5d'
red     = '#f66151'
green   = '#33d17a'
yellow  = '#e9ad0c'
blue    = '#2a7bde'
magenta = '#c061cb'
cyan    = '#33c7de'
white   = '#ffffff'

[bell]
animation = "EaseOut"
duration = 150
color = "#ffffff"

[terminal]
shell = "pwsh"
