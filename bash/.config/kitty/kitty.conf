# Shell Palette: https://gitlab.gnome.org/chergert/ptyxis/-/blob/main/src/palettes/gnome.palette
# Miscallaneous: https://github.com/Mofiqul/adwaita.nvim

font_family               DejaVuSansM Nerd Font

wayland_titlebar_color    system
hide_window_decorations   yes

foreground                #1d1d20
background                #ffffff

selection_foreground      #1d1d20
selection_background      #99C1F1

cursor                    none

active_tab_foreground     #504E55
active_tab_background     #FFFFFF

inactive_tab_foreground   #77767B
inactive_tab_background   #E0E0E0
tab_bar_background        #F6F5F4

color0                    #1d1d20
color1                    #c01c28
color2                    #26a269
color3                    #a2734c
color4                    #12488b
color5                    #a347ba
color6                    #2aa1b3
color7                    #cfcfcf
color8                    #5d5d5d
color9                    #f66151
color10                   #33d17a
color11                   #e9ad0c
color12                   #2a7bde
color13                   #c061cb
color14                   #33c7de
color15                   #ffffff

background_opacity        0.9
cursor_blink_interval     -1

tab_bar_edge              top
tab_bar_style             separator
tab_separator             "    ⁞    "

active_tab_font_style     bold
inactive_tab_font_style   normal

repaint_delay             8
input_delay               0

sync_to_monitor           no
scrollback_lines          20000

map     ctrl+shift+t      new_tab
map     ctrl+shift+w      close_tab
map     ctrl+shift+tab    prev_tab
map     ctrl+tab          next_tab
map     ctrl+shift+f      toggle_fullscreen
